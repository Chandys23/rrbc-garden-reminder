<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRBC 2026 Summer Garden Schedule Reminder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }

        .form-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
            color: #34495e;
            font-size: 13px;
        }

        .form-group input,
        .form-group select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .table-section {
            margin-top: 30px;
        }

        .table-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: #2c3e50;
            color: white;
        }

        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        tbody tr.editing {
            background: #fff9e6;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 3px;
        }

        .btn-edit {
            background: #3498db;
            color: white;
        }

        .btn-edit:hover {
            background: #2980b9;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        .btn-delete:hover {
            background: #c0392b;
        }

        .btn-save {
            background: #27ae60;
            color: white;
        }

        .btn-save:hover {
            background: #229954;
        }

        .btn-cancel {
            background: #95a5a6;
            color: white;
        }

        .btn-cancel:hover {
            background: #7f8c8d;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #95a5a6;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .form-group {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 20px;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌿 RRBC 2026 Summer Garden Schedule Reminder</h1>
            <p>Manage your garden care schedule and send automated reminders</p>
        </div>

        <div class="content">
            <!-- Message Display -->
            <div id="message" class="message"></div>

            <!-- Statistics -->
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">Total Schedules</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="upcomingCount">0</div>
                    <div class="stat-label">Upcoming This Week</div>
                </div>
            </div>

            <!-- Add/Edit Form -->
            <div class="form-section">
                <div class="form-title" id="formTitle">➕ Add New Garden Schedule</div>

                <div class="form-group">
                    <div>
                        <label for="date">Date (YYYY-MM-DD)</label>
                        <input type="date" id="date" required>
                    </div>
                    <div>
                        <label for="name">Gardener Name</label>
                        <input type="text" id="name" placeholder="e.g., John Doe" required>
                    </div>
                    <div>
                        <label for="task">Task Type</label>
                        <select id="task" required>
                            <option value="">-- Select Task --</option>
                            <option value="Front">Front</option>
                            <option value="Back">Back</option>
                            <option value="Trimming">Trimming</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <div>
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="e.g., john@example.com" required>
                    </div>
                    <div>
                        <label for="mobile">Mobile Number</label>
                        <input type="tel" id="mobile" placeholder="e.g., 123-456-7890" required>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-primary" id="submitBtn" onclick="addSchedule()">Add Schedule</button>
                    <button class="btn-secondary" id="cancelBtn" onclick="cancelEdit()" style="display: none;">Cancel</button>
                </div>
            </div>

            <!-- Table -->
            <div class="table-section">
                <div class="table-title">📋 Garden Schedule List</div>
                <div class="table-wrapper">
                    <table id="schedulesTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Gardener Name</th>
                                <th>Task</th>
                                <th>Email</th>
                                <th>Mobile</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr class="no-data">
                                <td colspan="6">No schedules yet. Add one using the form above.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let editingId = null;

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            loadSchedules();
            // Set today's date as default
            document.getElementById('date').valueAsDate = new Date();
        });

        function showMessage(message, type = 'success') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = message;
            messageEl.className = `message ${type}`;
            setTimeout(() => {
                messageEl.className = 'message';
            }, 5000);
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function getUpcomingCount() {
            const today = new Date();
            const nextWeek = new Date(today.getTime() + 7 * 24 * 60 * 60 * 1000);
            
            const tableRows = document.querySelectorAll('#tableBody tr');
            let count = 0;
            tableRows.forEach(row => {
                if (row.classList.contains('no-data')) return;
                const dateCell = row.cells[0].textContent;
                const rowDate = new Date(dateCell);
                if (rowDate >= today && rowDate <= nextWeek) {
                    count++;
                }
            });
            return count;
        }

        function updateStats() {
            const totalRows = document.querySelectorAll('#tableBody tr').length;
            const noData = document.querySelector('.no-data') !== null;
            
            document.getElementById('totalCount').textContent = noData ? 0 : totalRows;
            document.getElementById('upcomingCount').textContent = getUpcomingCount();
        }

        async function loadSchedules() {
            try {
                const response = await fetch(`${API_URL}/gardeners`);
                const gardeners = await response.json();
                
                const tableBody = document.getElementById('tableBody');
                
                if (gardeners.length === 0) {
                    tableBody.innerHTML = '<tr class="no-data"><td colspan="6">No schedules yet. Add one using the form above.</td></tr>';
                } else {
                    tableBody.innerHTML = gardeners.map(g => `
                        <tr>
                            <td>${formatDate(g.date)}</td>
                            <td>${g.name}</td>
                            <td><span style="background: #e8f4f8; padding: 4px 8px; border-radius: 3px;">${g.task}</span></td>
                            <td><a href="mailto:${g.email}" style="color: #667eea; text-decoration: none;">${g.email}</a></td>
                            <td>${g.mobile}</td>
                            <td>
                                <div class="action-buttons">
                                    <button class="btn-small btn-edit" onclick="editSchedule(${g.id})">Edit</button>
                                    <button class="btn-small btn-delete" onclick="deleteSchedule(${g.id})">Delete</button>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                }
                updateStats();
            } catch (error) {
                showMessage('Failed to load schedules', 'error');
                console.error(error);
            }
        }

        async function addSchedule() {
            const date = document.getElementById('date').value;
            const name = document.getElementById('name').value;
            const task = document.getElementById('task').value;
            const email = document.getElementById('email').value;
            const mobile = document.getElementById('mobile').value;

            if (!date || !name || !task || !email || !mobile) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            try {
                const url = editingId ? `${API_URL}/gardeners/${editingId}` : `${API_URL}/gardeners`;
                const method = editingId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ date, name, task, email, mobile })
                });

                if (response.ok) {
                    showMessage(editingId ? 'Schedule updated successfully!' : 'Schedule added successfully!', 'success');
                    resetForm();
                    loadSchedules();
                } else {
                    showMessage('Failed to save schedule', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
                console.error(error);
            }
        }

        async function editSchedule(id) {
            try {
                const response = await fetch(`${API_URL}/gardeners/${id}`);
                const gardener = await response.json();

                document.getElementById('date').value = gardener.date;
                document.getElementById('name').value = gardener.name;
                document.getElementById('task').value = gardener.task;
                document.getElementById('email').value = gardener.email;
                document.getElementById('mobile').value = gardener.mobile;

                document.getElementById('formTitle').textContent = '✏️ Edit Garden Schedule';
                document.getElementById('submitBtn').textContent = 'Save Changes';
                document.getElementById('cancelBtn').style.display = 'inline-block';

                editingId = id;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (error) {
                showMessage('Failed to load schedule details', 'error');
                console.error(error);
            }
        }

        async function deleteSchedule(id) {
            if (confirm('Are you sure you want to delete this schedule?')) {
                try {
                    const response = await fetch(`${API_URL}/gardeners/${id}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        showMessage('Schedule deleted successfully!', 'success');
                        loadSchedules();
                    } else {
                        showMessage('Failed to delete schedule', 'error');
                    }
                } catch (error) {
                    showMessage('Error: ' + error.message, 'error');
                    console.error(error);
                }
            }
        }

        function resetForm() {
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('name').value = '';
            document.getElementById('task').value = '';
            document.getElementById('email').value = '';
            document.getElementById('mobile').value = '';
            editingId = null;
        }

        function cancelEdit() {
            document.getElementById('formTitle').textContent = '➕ Add New Garden Schedule';
            document.getElementById('submitBtn').textContent = 'Add Schedule';
            document.getElementById('cancelBtn').style.display = 'none';
            resetForm();
        }
    </script>
</body>
</html>
